kind = "web"
previewPath = "/"
title = "نور أكاديمي"
version = "1.0.0"
id = "artifacts/nour-academy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20189

[services.development]
run = "pnpm --filter @workspace/nour-academy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nour-academy", "run", "build" ]
publicDir = "artifacts/nour-academy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20189"
BASE_PATH = "/"
